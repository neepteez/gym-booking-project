<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UI Components</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>UI Components Showcase</h1>
  <nav>
    <a href="index.html">Classes</a>
    <a href="page2.html">Book</a>
  </nav>
</header>

<main>
  <section>
    <h2>Cards</h2>
    <article class="class-card">
      <h3>HIIT Training</h3>
      <p>Date: 2026-03-10</p>
      <p>Spots left: 5</p>
      <button class="book-btn">Book</button>
    </article>

    <article class="class-card">
      <h3>Yoga Flow</h3>
      <p>Date: 2026-03-12</p>
      <p>Spots left: 0</p>
      <button class="book-btn" disabled>Full</button>
    </article>
  </section>

  <section>
    <h2>Buttons</h2>
    <button>Primary Button</button>
    <button disabled>Disabled Button</button>
  </section>

  <section>
    <h2>Forms</h2>
    <form>
      <label for="example-name">Name</label>
      <input id="example-name" type="text" placeholder="Your name">

      <label for="example-email">Email</label>
      <input id="example-email" type="email" placeholder="you@example.com">

      <label for="example-select">Choose Class</label>
      <select id="example-select">
        <option value="">--Select--</option>
        <option value="hiit">HIIT</option>
        <option value="yoga">Yoga</option>
      </select>

      <button type="submit">Submit</button>
    </form>
  </section>

</main>

<footer>
  <p>© 2026 Gym Booking System</p>
</footer>

<script src="script.js"></script>
</body>
</html>
